# ========================================
# TRANSACTION SERVICE CONFIGURATION
# ========================================
spring:
  application:
    name: transaction-service

  # ========================================
  # DATABASE CONFIGURATION
  # ========================================
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${TRANSACTION_DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: TransactionServiceHikariPool

  jpa:
    hibernate:
      ddl-auto: update  # Change to 'validate' in production
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

# ========================================
# SERVER CONFIGURATION
# ========================================
server:
  port: ${TRANSACTION_SERVICE_PORT}
  servlet:
    context-path: /

# ========================================
# SERVICE BUSINESS RULES
# ========================================
internal:
  service:
    secret: ${INTERNAL_SERVICE_SECRET_KEY}
transaction:
  idempotency:
    expiration-hours: 24          # How long to keep idempotency records

# ========================================
# EUREKA CLIENT CONFIGURATION
# ========================================
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 30

  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    instance-id: ${spring.application.name}:${server.port}
    metadata-map:
      zone: primary
      version: 1.0.0

# ========================================
# SPRINGDOC / SWAGGER CONFIGURATION
# ========================================
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
    doc-expansion: none
  show-actuator: false
  paths-to-match: /api/v1/transactions/**
  packages-to-scan: com.jk.finice.transactionservice.controller

# ========================================
# ACTUATOR CONFIGURATION
# ========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# ========================================
# LOGGING CONFIGURATION
# ========================================
logging:
  level:
    root: INFO
    com.JK.FinIce.transactionservice: DEBUG
    org.springframework.cloud.netflix.eureka: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  file:
    name: logs/transaction-service.log